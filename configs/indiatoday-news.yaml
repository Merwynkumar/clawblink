name: indiatoday-news
description: Monitors the Indiatoday website and updates the top 3 latest news every
  5 minutes.
trigger:
  type: polling
  interval_minutes: 5
  source: url_check
  url: https://www.indiatoday.in
actions:
- type: http_request
  method: GET
  url: https://www.indiatoday.in
  output: webpage_content
- type: llm_analyze
  prompt: 'Here is the latest news from Indiatoday: {webpage_content}. Extract the
    top 3 latest news.'
  output: top_news
- type: notify_whatsapp
  message: '{top_news}'
  to: 265995998519534@lid
